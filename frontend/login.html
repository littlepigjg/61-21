<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - DJ 控制台</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .login-container {
      max-width: 400px;
      margin: 80px auto;
      padding: 40px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      color: white;
    }

    .login-container h1 {
      text-align: center;
      margin-bottom: 30px;
      font-size: 28px;
    }

    .login-icon {
      font-size: 64px;
      text-align: center;
      display: block;
      margin-bottom: 20px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
    }

    .form-group input {
      width: 100%;
      padding: 12px 16px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      box-sizing: border-box;
    }

    .login-btn {
      width: 100%;
      padding: 14px;
      background: white;
      color: #667eea;
      border: none;
      border-radius: 8px;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      margin-top: 10px;
    }

    .login-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
    }

    .login-btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
    }

    .error-message {
      background: rgba(255, 255, 255, 0.2);
      color: white;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 20px;
      display: none;
      text-align: center;
    }

    .demo-accounts {
      margin-top: 30px;
      padding: 20px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 8px;
    }

    .demo-accounts h3 {
      margin: 0 0 15px 0;
      font-size: 16px;
      opacity: 0.9;
    }

    .demo-accounts ul {
      margin: 0;
      padding-left: 20px;
      font-size: 14px;
      opacity: 0.85;
    }

    .demo-accounts li {
      margin-bottom: 8px;
    }

    .back-link {
      text-align: center;
      margin-top: 20px;
    }

    .back-link a {
      color: white;
      text-decoration: none;
      opacity: 0.8;
    }

    .back-link a:hover {
      opacity: 1;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="login-container">
      <span class="login-icon">🎛️</span>
      <h1>DJ 控制台登录</h1>
      
      <div class="error-message" id="errorMessage"></div>
      
      <form id="loginForm">
        <div class="form-group">
          <label for="username">用户名</label>
          <input type="text" id="username" placeholder="请输入用户名" required>
        </div>
        
        <div class="form-group">
          <label for="password">密码</label>
          <input type="password" id="password" placeholder="请输入密码" required>
        </div>
        
        <button type="submit" class="login-btn" id="loginBtn">登录</button>
      </form>

      <div class="demo-accounts">
        <h3>测试账号：</h3>
        <ul>
          <li>超级管理员：admin / admin123</li>
          <li>频道管理员：channel_admin / admin123</li>
          <li>普通DJ：dj / dj123</li>
        </ul>
      </div>

      <div class="back-link">
        <a href="index.html">← 返回播放器</a>
      </div>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const loginForm = document.getElementById('loginForm');
      const errorMessage = document.getElementById('errorMessage');
      const loginBtn = document.getElementById('loginBtn');

      const currentUser = API.getCurrentUser();
      if (currentUser && localStorage.getItem('auth_token')) {
        window.location.href = 'dj.html';
        return;
      }

      loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;

        if (!username || !password) {
          showError('请输入用户名和密码');
          return;
        }

        loginBtn.disabled = true;
        loginBtn.textContent = '登录中...';
        errorMessage.style.display = 'none';

        try {
          const result = await API.auth.login(username, password);
          API.setCurrentUser(result.user, result.token);
          
          const redirectUrl = new URLSearchParams(window.location.search).get('redirect');
          window.location.href = redirectUrl || 'dj.html';
        } catch (err) {
          showError(err.message);
          loginBtn.disabled = false;
          loginBtn.textContent = '登录';
        }
      });

      function showError(message) {
        errorMessage.textContent = message;
        errorMessage.style.display = 'block';
      }
    });
  </script>
</body>
</html>
